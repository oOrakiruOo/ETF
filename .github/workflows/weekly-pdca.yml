name: Weekly ETF PDCA

on:
  workflow_dispatch:
  schedule:
    - cron: "10 23 * * 5"

permissions:
  contents: read

jobs:
  weekly-pdca:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      TZ: Asia/Tokyo
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh daily data
        run: python -m src.main daily-ops --refresh

      - name: Create weekly PDCA
        run: python -m src.main weekly

      - name: Create quick replay PDCA
        run: python -m src.main replay-quick

      - name: Check weekly artifacts
        run: python -m src.main weekly-health

      - name: Send weekly LINE summary
        run: python -m src.main line-broadcast-weekly-summary

      - name: Send LINE failure alert
        if: failure()
        shell: python
        run: |
          import json
          import os
          import urllib.request

          token = os.environ.get("LINE_CHANNEL_ACCESS_TOKEN")
          if not token:
              raise SystemExit(0)
          payload = {
              "messages": [
                  {
                      "type": "text",
                      "text": "ETF Rotation Weekly PDCA: GitHub Actions failed. 週次ログを確認してください。",
                  }
              ]
          }
          request = urllib.request.Request(
              "https://api.line.me/v2/bot/message/broadcast",
              data=json.dumps(payload, ensure_ascii=False).encode("utf-8"),
              method="POST",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              },
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              print(f"failure alert status={response.status}")

      - name: Upload weekly reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-pdca-reports
          path: |
            reports/weekly/
            reports/daily/
            data/processed/pdca/
            data/processed/line/
            data/processed/signals/
            data/processed/decisions/
            data/processed/data_source_status.csv
          if-no-files-found: ignore
