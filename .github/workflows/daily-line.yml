name: Daily ETF LINE

on:
  workflow_dispatch:
  schedule:
    - cron: "55 22 * * 0-4"

permissions:
  contents: read

jobs:
  daily-line:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Tokyo
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_TO_USER_ID: ${{ secrets.LINE_TO_USER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run daily operations
        run: python -m src.main daily-ops --refresh

      - name: Send LINE decision brief
        run: python -m src.main line-broadcast-decision-brief

      - name: Upload daily reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-reports
          path: |
            reports/daily/
            data/processed/line/
            data/processed/signals/
            data/processed/notifications/
            data/processed/decisions/
          if-no-files-found: ignore
