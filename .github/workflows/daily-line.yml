name: Daily ETF LINE

on:
  workflow_dispatch:
  schedule:
    - cron: "55 22 * * 0-4"

permissions:
  contents: read

jobs:
  daily-line:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Tokyo
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run daily operations
        run: python -m src.main daily-ops --refresh

      - name: Send LINE decision brief
        run: python -m src.main line-broadcast-decision-brief

      - name: Send LINE failure alert
        if: failure()
        shell: python
        run: |
          import json
          import os
          import urllib.request

          token = os.environ.get("LINE_CHANNEL_ACCESS_TOKEN")
          if not token:
              raise SystemExit(0)
          payload = {
              "messages": [
                  {
                      "type": "text",
                      "text": "ETF Rotation Daily: GitHub Actions failed. Actionsログを確認してください。",
                  }
              ]
          }
          request = urllib.request.Request(
              "https://api.line.me/v2/bot/message/broadcast",
              data=json.dumps(payload, ensure_ascii=False).encode("utf-8"),
              method="POST",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              },
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              print(f"failure alert status={response.status}")

      - name: Upload daily reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-reports
          path: |
            reports/daily/
            data/processed/line/
            data/processed/signals/
            data/processed/notifications/
            data/processed/decisions/
            data/processed/data_source_status.csv
          if-no-files-found: ignore
